<tbody>
  <tr *ngFor="let evento of listaEventos">
    <td>{{ evento.titulo }}</td>
    <td>{{ evento.fecha }}</td>
    <td>{{ evento.lugar }}</td>
    <td>{{ evento.categoria }}</td>
    <td>
      <span *ngIf="evento.precio > 0">
        ${{ evento.precio }}
      </span>
      <span *ngIf="evento.precio == 0">
        Gratis
      </span>
    </td>
  </tr>
</tbody>
