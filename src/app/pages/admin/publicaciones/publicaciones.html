<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold mb-1">Publicaciones</h2>
    <p class="text-muted mb-0">Control de eventos y avisos publicados</p>
  </div>

  <div class="btn-group">
    <button class="btn btn-outline-dark" disabled>Todos</button>
    <button class="btn btn-outline-dark" disabled>Pendientes</button>
    <button class="btn btn-outline-dark" disabled>Aprobados</button>
  </div>
</div>

<div class="row g-4" *ngIf="!cargando">
  @for (evento of eventos; track evento._id) {
    <div class="col-md-6">
      <div class="card admin-card p-4 h-100 d-flex flex-column">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div>
            <h5 class="mb-1">{{ evento.titulo }}</h5>
            <small class="text-muted">Fecha: {{ evento.fecha }} | Ubicación: {{ evento.ubicacion }}</small>
          </div>
          <span class="badge" [ngClass]="evento.estado === 'PUBLICADO' ? 'bg-success' : 'bg-warning text-dark'">
            {{ evento.estado || 'PUBLICADO' }}
          </span>
        </div>

        <p class="text-muted">{{ evento.descripcion }}</p>

        <div class="d-flex gap-2 mt-auto pt-3">
          <button class="btn btn-success btn-sm" *ngIf="evento.estado !== 'PUBLICADO' && auth.isAdmin()" (click)="aprobarEvento(evento._id!)">Aprobar</button>
          <button class="btn btn-outline-danger btn-sm" *ngIf="auth.isAdmin()" (click)="eliminarEvento(evento._id!)">Eliminar Definitivo</button>
        </div>
      </div>
    </div>
  }

  <div *ngIf="eventos.length === 0" class="col-12 text-center text-muted py-5">
    <p>No existen publicaciones registradas.</p>
  </div>
</div>
