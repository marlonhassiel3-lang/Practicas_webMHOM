<div class="admin-shell d-flex">
  <aside class="admin-sidebar p-4">
    <div class="mb-4">
      <h4 class="mb-1">UPP Admin</h4>
      <small class="text-white-50">Super administrador</small>
    </div>

    <nav class="nav flex-column gap-2">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
      <a routerLink="/admin/profesores" routerLinkActive="active" class="nav-link" *ngIf="auth.isAdmin()">Profesores/Admin</a>
      <a routerLink="/admin/publicaciones" routerLinkActive="active" class="nav-link">Publicaciones</a>
      <a routerLink="/admin/avisos" routerLinkActive="active" class="nav-link" *ngIf="auth.isAdmin()">Avisos</a>
      <a routerLink="/admin/solicitudes" routerLinkActive="active" class="nav-link" *ngIf="auth.isAdmin()">Solicitudes</a>
      <a routerLink="/admin/configuracion" routerLinkActive="active" class="nav-link" *ngIf="auth.isAdmin()">Configuración</a>
      <a routerLink="/profesor/mis-eventos" class="nav-link" *ngIf="auth.isProfesor()">Mis Eventos Físicos</a>
      <a routerLink="/" class="nav-link mt-3">Volver al sitio</a>
    </nav>
  </aside>

  <main class="admin-main flex-grow-1">
    <header class="admin-topbar px-4 py-3 d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <a routerLink="/" class="back-home-link">
          <span>←</span>
        </a>
        <div>
          <h5 class="mb-0">Panel de Administración</h5>
          <small class="text-muted">Gestión general de la plataforma</small>
        </div>
      </div>
      <button (click)="logout()" class="btn btn-outline-dark btn-sm">
        Salir
      </button>
     
    </header>

    <section class="p-4">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
