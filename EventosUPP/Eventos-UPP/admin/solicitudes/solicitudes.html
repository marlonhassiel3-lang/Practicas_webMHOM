<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold mb-1">Solicitudes y Mensajes</h2>
    <p class="text-muted mb-0">Mensajes recibidos por estudiantes y organizadores</p>
  </div>

  <button class="btn btn-dark" (click)="marcarTodasLeidas()">Marcar todo como leído</button>
</div>

<div class="row g-4" *ngIf="!cargando">
  @for (solicitud of solicitudes; track solicitud._id) {
    <div class="col-md-6">
      <div class="card admin-card p-4 h-100 d-flex flex-column">
        <div class="d-flex justify-content-between">
          <div>
            <h5 class="mb-1">{{ solicitud.nombre }}</h5>
            <small class="text-muted">{{ solicitud.email }}</small>
          </div>
          <span class="badge" [ngClass]="solicitud.estado === 'NUEVO' ? 'bg-danger' : 'bg-warning text-dark'">
            {{ solicitud.estado || 'NUEVO' }}
          </span>
        </div>

        <p class="mt-3 mb-4">{{ solicitud.mensaje }}</p>

        <div class="d-flex gap-2 mt-auto">
          <button class="btn btn-outline-dark btn-sm" (click)="responder(solicitud)">Responder</button>
          <button class="btn btn-outline-danger btn-sm" (click)="eliminarSolicitud(solicitud._id)">Eliminar</button>
        </div>
      </div>
    </div>
  }

  <div *ngIf="solicitudes.length === 0" class="col-12 text-center py-5 text-muted">
    <p>La bandeja de solicitudes está limpia.</p>
  </div>
</div>
