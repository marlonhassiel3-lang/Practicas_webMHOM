<div class="container mt-5">

<h2>Mis Eventos</h2>

<div *ngIf="eventos.length === 0" class="alert alert-info">
No tienes eventos registrados
</div>

<div class="row">

<div class="col-md-4 mb-4" *ngFor="let evento of eventos; let i = index">

<div class="card shadow">

<div class="card-body">

<h5>{{ evento.nombre }}</h5>

<p>
<strong>Fecha:</strong> {{ evento.fecha }} <br>
<strong>Lugar:</strong> {{ evento.lugar }} <br>
<strong>Organizador:</strong> {{ evento.organizador }}
</p>

<button class="btn btn-danger w-100" (click)="eliminarEvento(i)">
Eliminar
</button>

</div>

</div>

</div>

</div>

</div>
