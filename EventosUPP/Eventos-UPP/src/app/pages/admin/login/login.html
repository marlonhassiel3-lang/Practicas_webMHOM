<div class="admin-login-wrap">
  <div class="card admin-card p-4">
    <div class="text-center mb-4">
      <span class="badge rounded-pill admin-badge mb-3">Acceso Administrativo</span>
      <h2 class="fw-bold mb-2">Super Administrador</h2>
      <p class="text-muted mb-0">Administración general de la plataforma</p>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo institucional</label>
      <input type="email" class="form-control" placeholder="admin@upp.edu.mx">
    </div>

    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" placeholder="••••••••">
    </div>

    <a routerLink="/admin" class="btn btn-dark w-100 mb-2">
      Entrar al panel
    </a>

    <a routerLink="/" class="btn btn-outline-secondary w-100">
      Volver al sitio
    </a>
  </div>
</div>
