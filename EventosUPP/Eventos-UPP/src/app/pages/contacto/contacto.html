<h2 class="mb-4">Contacto</h2>

<div class="row">

  <div class="col-md-6">

    <form>

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Mensaje</label>
        <textarea class="form-control" rows="4"></textarea>
      </div>

      <button class="btn btn-primary">
        Enviar mensaje
      </button>

    </form>

  </div>

  <div class="col-md-6">

    <div class="card shadow">
      <div class="card-body">

        <h5>Información</h5>

        <p>
          Si tienes dudas sobre los eventos o actividades,
          puedes enviar un mensaje al organizador.
        </p>

        <p><strong>Email:</strong> eventos@universidadUPP.edu.mx</p>

      </div>
    </div>

  </div>

</div>
