<h1 class="text-danger">FUNCIONA CONTACTO 🔥</h1>
<div class="container mt-4">
<h2>Contacto</h2>
<form #formContacto="ngForm"
(ngSubmit)="procesarFormulario(formContacto)">
<div class="mb-3">
<label class="form-label">Nombre</label>
<input
type="text"
class="form-control"
name="nombre"
ngModel
required>
</div>
<div class="mb-3">
<label class="form-label">Correo</label>
<input
type="email"
class="form-control"
name="correo"
ngModel
required
email>
</div>
<button class="btn btn-primary" type="submit">
Enviar
</button>
</form>
</div>
<div class="modal fade" id="modalResultado"
tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">{{ tituloModal
}}</h5>

<button class="btn-close" data-bs-
dismiss="modal"></button>

</div>
<div class="modal-body">
<p>{{ mensajeModal }}</p>
</div>
</div>
</div>
</div>
